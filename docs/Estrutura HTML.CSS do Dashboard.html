<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowUI - Dashboard</title>
    <style>
        /* Variáveis de Tema (Light Mode Padrão) */
        :root {
            --bg-body: #f5f8fa;
            --bg-surface: #ffffff;
            --text-primary: #181c32;
            --text-secondary: #a1a5b7;
            --border-color: #eff2f5;
            --accent-blue: #009ef7;
            --accent-purple: #7239ea;
            --sidebar-width: 250px;
        }

        /* Variáveis de Tema Escuro (Dark Mode) */
        body.dark-theme {
            --bg-body: #151521;
            --bg-surface: #1e1e2d;
            --text-primary: #ffffff;
            --text-secondary: #565674;
            --border-color: #2b2b40;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background-color: var(--bg-surface); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; color: var(--accent-blue); }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background-color: var(--bg-body); color: var(--accent-blue); }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px 30px; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-title h1 { font-size: 22px; }
        .header-actions button { padding: 10px 20px; border: none; border-radius: 8px; background-color: var(--bg-surface); color: var(--text-primary); cursor: pointer; border: 1px solid var(--border-color); transition: 0.2s; }
        .header-actions button:hover { background-color: var(--border-color); }

        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background-color: var(--bg-surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .kpi-title { font-size: 14px; color: var(--text-secondary); }
        .kpi-value { font-size: 24px; font-weight: bold; }
        .kpi-trend { font-size: 12px; color: #50cd89; } /* Verde para positivo */

        /* Charts Area */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { background-color: var(--bg-surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); min-height: 300px; display: flex; flex-direction: column; }
        .chart-header { margin-bottom: 20px; font-weight: bold; }
        .chart-placeholder { flex: 1; background-color: var(--bg-body); border-radius: 8px; border: 1px dashed var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }

        /* Responsividade Básica */
        @media (max-width: 768px) {
            .sidebar { display: none; /* Em um projeto real, faríamos um menu hamburguer */ }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">SnowUI</div>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item">Analytics</div>
        <div class="nav-item">Reports</div>
        <div class="nav-item">Settings</div>
    </aside>

    <main class="main-content">
        <header>
            <div class="header-title">
                <h1>Overview</h1>
            </div>
            <div class="header-actions">
                <button onclick="toggleTheme()">Alternar Tema Escuro</button>
            </div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card">
                <span class="kpi-title">Total Views</span>
                <span class="kpi-value">7,265</span>
                <span class="kpi-trend">+11.02%</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-title">Visits</span>
                <span class="kpi-value">3,671</span>
                <span class="kpi-trend">-0.03%</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-title">New Users</span>
                <span class="kpi-value">256</span>
                <span class="kpi-trend">+15.03%</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-title">Active Users</span>
                <span class="kpi-value">2,318</span>
                <span class="kpi-trend">+6.08%</span>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">Revenue Statistics</div>
                <div class="chart-placeholder">[Gráfico de Linha]</div>
            </div>
            <div class="chart-card">
                <div class="chart-header">Traffic Sources</div>
                <div class="chart-placeholder">[Gráfico de Barras/Pizza]</div>
            </div>
        </div>
    </main>

    <script>
        // Função simples para alternar entre o tema claro e escuro
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }
    </script>
</body>
</html>
